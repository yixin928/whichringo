        body {

            font-family: "Noto Serif SC", "SimSun", "Songti SC", "Times New Roman", Georgia, serif; 
            background: #aea29c; /* 底色 #945233*/

        }
        .container { max-width: 700px; margin: 0 auto; padding: 20px; }
        .page { display: none; }

        /* 语言切换按钮 */
        .lang-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #fff;
            color: #945233;
            border: 2px solid #945233;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
            z-index: 100;
        }
        .lang-btn:hover {
            background: #945233;
            color: #fff;
        }
        
        /* 卡片通用样式 */
        .card {
            background: #fff;
            border: 2px solid #945233;
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 24px;

        /* 开始页面 */
        #start-page { padding: 60px 20px; }

            text-align: center;
            padding-top: 60px; 
            margin-bottom: 40px;
        }
        .indicator-title {

            letter-spacing: 4px;
            text-transform: uppercase;

        /* 首页标题图片样式 */

            color: #945233;
            margin-bottom: 12px;
            line-height: 1.2;
            font-weight: 500;
        }
        .test-subtitle {
            font-size: 1.2em;
            font-style: italic;
            margin-bottom: 40px;
        }
        .tags {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }
        .tag {
            background: #fff;
            border: 1px solid #945233;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .start-btn {
            display: block;
            width: 200px;
            margin: 0 auto;
            background: #945233;
            color: #fff;
            border: none;
            padding: 16px 32px;
            font-size: 1.1em;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
            box-shadow: 0 8px 24px rgba(148, 82, 51, 0.3);
        }
        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(148, 82, 51, 0.4);
        }
        .footer {
            text-align: center;
            margin-top: 60px;
            font-size: 0.9em;
            line-height: 2;
        }
         /* 分享按钮样式 */
        .share-btn {
            display: block;
            margin: 12px auto 0;
            background: transparent;
            color: #945233;
            border: 2px solid #945233;
        }
        .share-btn:hover {
            background: #F5EDE5;
            transform: translateY(-2px);
        }

         /* GIF样式 */
         .title-gif {
            height: 1em;
            width: auto;
            vertical-align: middle;
            display: inline-block;
            margin-left: 6px;
        }
        
        /* 测试页面 */
        #quiz-page { padding: 50px 20px; }
        .progress { 
            height: 4px; 
            background: #E8E0D8; 
            border-radius: 2px; 
            margin-bottom: 50px; 
            overflow: hidden; 
        }
        .progress-bar { 
            height: 100%; 
            background: #945233; 
            width: 0%; 
            transition: width 0.3s; 
        }
        .question { 
            font-size: 1.4em; 
            margin-bottom: 40px; 
            color: #945233;
            line-height: 1.8;
        }
        .options { display: flex; flex-direction: column; gap: 18px; }
        .option { 
            background: #fff; 
            padding: 22px 26px; 
            border-radius: 16px; 
            cursor: pointer; 
            transition: all 0.3s; 
            border: 2px solid transparent;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .option:hover { 
            border-color: #945233; 
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(148, 82, 51, 0.1);
        }
        .option.selected { 
            border-color: #945233; 
            background: #F5EDE5; 
        }
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 50px; }
        .btn { 
            background: #945233; 
            color: #fff; 
            border: none; 
            padding: 12px 32px; 
            font-size: 1em; 
            border-radius: 25px; 
            cursor: pointer; 
            transition: all 0.3s;
            font-family: inherit;
        }
        .btn:hover { 
            background: #A0522D; 
            transform: translateY(-2px);
        }
        .btn-secondary { 
            background: #E8E0D8; 
            color: #945233; 
        }
        .btn-secondary:hover { 
            background: #D9CCC0; 
        }
        /* 网易云音乐按钮样式 */
        .music-btn {

            width: 220px;
            margin: 30px auto 20px;
            background: #945233;
            color: #fff;
            border: none;
            padding: 12px 24px;
            font-size: 1em;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
        }
        .music-btn:hover {
            background: #a10c0c;
            transform: translateY(-2px);
        }
        
        /* 结果页面 */
        #result-page { padding: 60px 20px; }

        .apple-img {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px auto;
            display: block;
            object-fit: contain;
        }

        .result-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .result-personality {
            font-size: 2.2em;
            color: #945233;
            margin-bottom: 8px;
            letter-spacing: 3px;
            font-weight: 500;
        }
        .result-artist {
            font-size: 1.1em;
            font-style: italic;
        }
        
        /* 通用模块样式 */
        .result-module {
            background: #fff;
            border: 2px solid #945233;
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 25px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.05);

        .result-module h3 {
            font-size: 0.9em;
            color: #945233;
            margin-bottom: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        /* 模块二：歌词 */
        .result-lyrics {
            font-size: 1.15em;
            color: #aea29c;
            font-style: italic;
            line-height: 2;
        }
        
        /* 模块三：人格说明 */
        .result-keyword {
            font-size: 1.3em;
            color: #945233;
            margin-bottom: 16px;
            font-weight: 500;
        }
        .result-trait {
            font-size: 1.05em;
            color: #aea29c;
            line-height: 2;
        }
        
        /* 模块四：灵魂伴侣 */
        .soulmate-item {
            margin-bottom: 28px;
            padding-bottom: 28px;
            border-bottom: 1px solid #E8E0D8;
        }
        .soulmate-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        .soulmate-name {
            font-size: 1.2em;
            color: #945233;
            margin-bottom: 12px;
            font-weight: 500;
        }
        .soulmate-lyrics {
            font-size: 1em;
            color: #aea29c;
            font-style: italic;
            margin-bottom: 12px;
            line-height: 1.8;
        }
        .soulmate-desc {
            font-size: 1em;
            color: #aea29c;
            line-height: 1.8;
        }
        
        .restart-btn {
            display: block;
            margin: 0 auto;
        }

        /* ===== 手机端响应式布局 ===== */
        @media (max-width: 600px) {
            /* 卡片内边距缩小 */

                padding: 24px 20px;
                border-radius: 18px;
            }

            #start-page { padding: 30px 12px; }
            .start-header { margin-bottom: 24px; }
            .ringo-logo-img { width: 90px; margin-bottom: 14px; }
            .test-title { font-size: 1.6em; }
            .test-subtitle { font-size: 1em; margin-bottom: 24px; }
            .tags { gap: 10px; margin-bottom: 24px; }
            .tag { padding: 6px 14px; font-size: 0.8em; }
            .start-btn { padding: 14px 24px; font-size: 1em; }
            .footer { margin-top: 32px; font-size: 0.8em; }
 
            /* 测试页面间距缩小 */
            #quiz-page { padding: 24px 12px; }
            .progress { margin-bottom: 28px; }
            /* 题目字体缩小，避免手机上过大 */
            .question { font-size: 1.1em; margin-bottom: 24px; line-height: 1.7; }
            .options { gap: 12px; }
            .option { padding: 16px 18px; font-size: 0.95em; border-radius: 12px; }
            .nav-buttons { margin-top: 28px; }
            .btn { padding: 10px 22px; font-size: 0.95em; }
 
            /* 结果页面间距缩小 */
            #result-page { padding: 30px 12px; }
            .apple-img { width: 90px; height: 90px; margin-bottom: 20px; }
            .result-personality { font-size: 1.7em; letter-spacing: 2px; }
            .result-artist { font-size: 1em; }
            .result-header { margin-bottom: 24px; }
            .result-module { padding: 20px 18px; margin-bottom: 16px; border-radius: 14px; }
            .result-module h3 { font-size: 0.8em; margin-bottom: 10px; }
            .result-lyrics { font-size: 1em; }
            .result-keyword { font-size: 1.1em; margin-bottom: 10px; }
            .result-trait { font-size: 0.95em; line-height: 1.8; }
            .soulmate-name { font-size: 1.05em; margin-bottom: 8px; }
            .soulmate-lyrics { font-size: 0.9em; margin-bottom: 8px; }
            .soulmate-desc { font-size: 0.9em; }
            .soulmate-item { margin-bottom: 18px; padding-bottom: 18px; }
            .music-btn { font-size: 0.95em; padding: 10px 20px; margin: 20px auto 14px; }
 
            /* 语言切换按钮手机端位置 */
            .lang-btn { top: 12px; right: 12px; padding: 6px 12px; font-size: 0.85em; }
        }
    </style>
</head>

                </div>
            </div>
        </div>

        <!-- 结果页面 -->
        <div id="result-page" class="page">
            <div class="card">

                <img src="" alt="苹果人格" class="apple-img" id="apple-img">
                <div class="result-header">
                    <div class="result-personality" id="result-personality"></div>
                    <div class="result-artist" id="result-artist"></div>
                </div>

                <!-- 模块二：歌词 -->
                <div class="result-module">
                    <h3 data-zh="对应歌词" data-en="Lyrics">对应歌词</h3>
                    <div class="result-lyrics" id="result-lyrics"></div>

                <button class="btn restart-btn" onclick="restartQuiz()" data-zh="再测一次" data-en="Take Again">再测一次</button>
                <button class="btn share-btn" id="share-btn" onclick="shareResult()" data-zh="分享结果" data-en="Share Result">分享结果</button>

                    <div class="stats-content" id="stats-info">

        let currentQuestion = 0;

        // 初始化分数
        function initScores() {
            scores = {};
            Object.keys(data.zh.results).forEach(type => {
                scores[type] = 0;
            });
        }

        // 语言切换
        function toggleLang() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            document.getElementById('lang-btn').textContent = currentLang === 'zh' ? 'EN' : '中文';
 
            // 更新所有带 data-zh/data-en 属性的静态元素
            document.querySelectorAll('[data-zh]').forEach(el => {
                el.textContent = el.getAttribute(`data-${currentLang}`);
            });
 
            // 如果在测试页面，重新渲染当前题目
            if (document.getElementById('quiz-page').classList.contains('active')) {
                showQuestion();
            }
 
            // 如果在结果页面，重新渲染结果（需要 currentResultType 已赋值）
            if (document.getElementById('result-page').classList.contains('active') && currentResultType) {
                showResult(currentResultType);
            }
        }

        // 显示页面
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById(pageId).classList.add('active');
        }

        // 开始测试
        function startQuiz() {
            currentQuestion = 0;
            answers = [];
            initScores();
            showPage("quiz-page");
            showQuestion();
        }

        // 显示题目
        function showQuestion() {
            const questions = data[currentLang].questions;
            const question = questions[currentQuestion];
            document.getElementById("question").textContent = question.question;
            
            const optionsContainer = document.getElementById("options");
            optionsContainer.innerHTML = "";
            
            question.options.forEach((option, index) => {
                const optionDiv = document.createElement("div");
                optionDiv.className = "option";
                optionDiv.textContent = option.text;
                optionDiv.onclick = () => selectOption(index);
                
                // 恢复已选状态
                if (answers[currentQuestion] === index) {
                    optionDiv.classList.add("selected");
                }
                
                optionsContainer.appendChild(optionDiv);
            });

            // 更新进度条
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById("progress-bar").style.width = progress + "%";

            // 更新导航按钮
            document.getElementById("prev-btn").style.visibility = currentQuestion === 0 ? "hidden" : "visible";
            document.getElementById("next-btn").textContent = currentQuestion === questions.length - 1 ? 
                (currentLang === 'zh' ? "查看结果" : "See Result") : 
                (currentLang === 'zh' ? "下一题" : "Next");
        }

        // 选择选项
        function selectOption(index) {
            answers[currentQuestion] = index;
            
            // 更新UI
            document.querySelectorAll(".option").forEach((option, i) => {
                option.classList.toggle("selected", i === index);
            });
        }

        // 上一题
        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion();
            }
        }

        // 下一题
        function nextQuestion() {
            if (answers[currentQuestion] === undefined) {
                alert(currentLang === 'zh' ? "请先选择一个选项~" : "Please select an option first~");
                return;
            }

            if (currentQuestion < data[currentLang].questions.length - 1) {
                currentQuestion++;
                showQuestion();
            } else {
                calculateResult();
            }
        }

        // 计算结果
        function calculateResult() {
            const questions = data[currentLang].questions;
            answers.forEach((answerIndex, questionIndex) => {
                const selectedTypes = questions[questionIndex].options[answerIndex].types;
                selectedTypes.forEach(type => {
                    if (scores[type] !== undefined) scores[type]++;
                });
            });

            // 找出最高分人格
            let maxScore = 0;
            let resultTypes = [];
            Object.keys(scores).forEach(type => {
                if (scores[type] > maxScore) {
                    maxScore = scores[type];
                    resultTypes = [type];
                } else if (scores[type] === maxScore) {
                    resultTypes.push(type);
                }
            });

            // 随机选择一个结果（并列时）
             const resultType = resultTypes[Math.floor(Math.random() * resultTypes.length)];
            // ✅ 修复：记录当前结果类型，供语言切换时重新渲染使用
            currentResultType = resultType;
            showResult(resultType);
        }

            document.getElementById("result-artist").textContent = `Sheena Ringo · ${result.song}`;
            
            // 模块二：歌词 / 自动换行
            const formattedLyrics = result.lyrics.replace(/\//g, '<br>');
            document.getElementById("result-lyrics").innerHTML = formattedLyrics;
            
            // 模块三：人格说明
            document.getElementById("result-keyword").textContent = result.keyword;
            document.getElementById("result-trait").textContent = result.trait;
            
            // 模块四：灵魂伴侣
            const soulmateContainer = document.getElementById("soulmate-container");
            soulmateContainer.innerHTML = "";
            result.soulmate.forEach(soulmate => {
                const soulmateItem = document.createElement("div");
                soulmateItem.className = "soulmate-item";
                soulmateItem.innerHTML = `
                    <div class="soulmate-name">${soulmate.name}</div>
                    <div class="soulmate-lyrics">${soulmate.lyrics}</div>
                    <div class="soulmate-desc">${soulmate.desc}</div>
                `;
                soulmateContainer.appendChild(soulmateItem);
            });

            // 网易云音乐按钮链接
            document.getElementById("music-btn").href = musicUrls[type];

            showPage("result-page");
            // 将结果写入 URL，实现刷新保留
            history.replaceState(null, '', '#result=' + encodeURIComponent(type));
            // 显示结果时渲染统计卡
            renderStats();
            }

        // 重新测试
       function restartQuiz() {
            startQuiz();
            // 清除URL hash
            history.replaceState(null, '', window.location.pathname);
        }

                prompt(currentLang === 'zh' ? '复制此链接：' : 'Copy this link:', url);
            });
        }

<script>

// 记录访客位置到 Supabase
async function recordVisitorLocation() {
    try {
        const res = await fetch('https://ipapi.co/json/');
        const info = await res.json();
        const lat = info.latitude || 0;
        const lng = info.longitude || 0;
        const city = info.city || '未知';
        const country = info.country_name || info.country || '??';
 
        await fetch(`${SUPABASE_URL}/rest/v1/visitor_locations`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
            },
            body: JSON.stringify({ city, country, lat, lng })
        });
 
        return { city, country, lat, lng };
    } catch (e) {
        console.error('记录位置失败:', e);
        return { city: '未知地区', country: '', lat: 0, lng: 0 };
    }
}
 
// 获取全局访问次数（调用原有 RPC）
async function getVisitCount() {
    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/increment_visit_count`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
            }
        });
        if (!res.ok) return null;
        return await res.json();
    } catch (e) {
        return null;
    }
}
 
// 获取所有访客位置
async function getAllLocations() {
    try {
        const res = await fetch(
            `${SUPABASE_URL}/rest/v1/visitor_locations?select=lat,lng,city,country&order=created_at.desc&limit=500`,
            {
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                }
            }
        );
        if (!res.ok) return [];
        return await res.json();
    } catch (e) {
        return [];
    }
}
 
// 初始化 Leaflet 世界地图
function initMap(locations, myLat, myLng) {
    if (visitorMap) {
        visitorMap.remove();
        visitorMap = null;
    }
 
    visitorMap = L.map('visitor-map', { zoomControl: false, attributionControl: false })
        .setView([20, 0], 1.5);
 
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 4
    }).addTo(visitorMap);
 
    // 所有访客打点
    locations.forEach(loc => {
        if (loc.lat && loc.lng) {
            L.circleMarker([loc.lat, loc.lng], {
                radius: 4,
                color: '#945233',
                fillColor: '#c48a6e',
                fillOpacity: 0.7,
                weight: 1
            }).addTo(visitorMap)
              .bindPopup(`${loc.city || ''}, ${loc.country || ''}`);
        }
    });
 
    // 当前访客用更大的点标记
    if (myLat && myLng) {
        L.circleMarker([myLat, myLng], {
            radius: 7,
            color: '#fff',
            fillColor: '#945233',
            fillOpacity: 1,
            weight: 2
        }).addTo(visitorMap)
          .bindPopup('📍 你在这里').openPopup();
    }
}
 
// 渲染统计卡（结果页显示时调用）
async function renderStats() {
    document.getElementById('stats-card').style.display = 'block';
 
    const [myLocation, totalVisits, allLocations] = await Promise.all([
        recordVisitorLocation(),
        getVisitCount(),
        getAllLocations()
    ]);
 
    // 延迟初始化地图（等 DOM 可见）
    setTimeout(() => {
        initMap(allLocations, myLocation.lat, myLocation.lng);
        if (visitorMap) visitorMap.invalidateSize();
    }, 100);
 
    const statsEl = document.getElementById('stats-info');
    const locationStr = myLocation.city ? `${myLocation.city}, ${myLocation.country}` : '未知地区';
 
    if (totalVisits) {
        statsEl.innerHTML = `Visit Times: <span>${totalVisits}</span><br> This apple is from：<span>${locationStr}</span>`;
    } else {
        statsEl.innerHTML = `统计服务暂时不可用<br>你的访问来自：<span>${locationStr}</span>`;
    }
}
 
// 刷新后恢复结果页
document.addEventListener('DOMContentLoaded', function() {

        if (data[currentLang] && data[currentLang].results[type]) {

});
